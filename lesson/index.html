<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" type="image/x-icon" href="https://canvas.instructure.com/favicon.ico">
        <title>Inbox</title>

        <link rel="stylesheet" href="/styles/global.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-bg text-white">
        <div id="navbar"></div>

        <main class="pt-20 px-4 max-w-7xl mx-auto">
            <div class="card bg-warning/25 px-5 py-4 flex items-center gap-1 hidden" id="lessonWarning">
                <img class="h-5 mr-2" src="/assets/icons/warning.png" alt=""></img>
                <span class="text-warning" id="lessonWarningText"></span>
            </div>

            <iframe id="lessonFrame" class="w-full rounded-xl border-0 aspect-video" allowfullscreen></iframe>
            
            <div class="flex items-center justify-between py-2 px-4">
                <h1 id="lessonName" class="text-2xl font-semibold text-white">Loading...</h1>
                
                <button id="fullscreen" class="w-10 h-10 rounded-lg hover:bg-white/5 transition flex items-center justify-center">
                <img src="/assets/icons/fullscreen.png" class="w-8 h-8 object-contain" alt="Fullscreen">
                </button>
            </div>
            </main>

        <script src="/scripts/global.js"></script>
        <script src="./index.js"></script>
    </body>
</html>
